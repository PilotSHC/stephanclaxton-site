name: Scheduled publish

on:
  schedule:
    # Once a day at 16:05 UTC = 9:05 AM Pacific (PDT) / 8:05 AM Pacific (PST)
    # The :05 offset avoids top-of-hour congestion on GitHub's scheduler,
    # which can delay top-of-hour runs by 5-15 minutes during heavy load.
    - cron: '5 16 * * *'
  workflow_dispatch:
    inputs:
      force_slug:
        description: 'Force-publish a specific slug now (ignores publishAt)'
        required: false
        type: string

permissions:
  contents: write  # needs write to commit back published.json + generated site pages
  issues: write    # needs write to create LinkedIn reminder issues

concurrency:
  group: scheduled-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install script deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Run scheduler
        id: run
        env:
          SITE_URL: https://www.stephanclaxton.com
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          HASHNODE_TOKEN: ${{ secrets.HASHNODE_TOKEN }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
          MEDIUM_TOKEN: ${{ secrets.MEDIUM_TOKEN }}
          MEDIUM_USER_ID: ${{ secrets.MEDIUM_USER_ID }}
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          FORCE_SLUG: ${{ inputs.force_slug }}
        run: node scripts/run-scheduled-publish.js

      - name: Commit state changes
        if: steps.run.outputs.any_published == 'true'
        run: |
          git config user.name "stephanclaxton-bot"
          git config user.email "bot@stephanclaxton.com"
          git add content/published.json app/writing/ app/page.tsx app/sitemap.ts
          if git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "chore(publish): release ${{ steps.run.outputs.slugs }}"
          git push

      - name: Trigger Vercel production deploy
        if: steps.run.outputs.any_published == 'true'
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK not set; relying on GitHub push webhook for Vercel."
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
          echo "Vercel deploy hook triggered."

      - name: Create LinkedIn reminder issues
        if: steps.run.outputs.linkedin_reminders == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "linkedin-reminder" --description "Reminder to post article on LinkedIn" --color "0A66C2" 2>/dev/null || true
          node -e "
          const reminders = require('./content/linkedin-reminders.json');
          for (const r of reminders) {
            const body = [
              'A new article just published to the site. Time to share it on LinkedIn.',
              '',
              '## ' + r.title,
              '',
              '**URL:** ' + r.url,
              '',
              '### LinkedIn post text',
              '',
              'Copy everything below the line into LinkedIn along with the URL above.',
              '',
              '---',
              '',
              r.linkedinHook || '(No linkedinHook in frontmatter. Write a short hook manually.)',
            ].join('\n');
            console.log(JSON.stringify({ title: 'LinkedIn: ' + r.title, body, slug: r.slug }));
          }
          " | while IFS= read -r line; do
            title=$(echo "$line" | jq -r '.title')
            body=$(echo "$line" | jq -r '.body')
            gh issue create --title "$title" --body "$body" --label "linkedin-reminder"
          done

      - name: Clean up reminder file
        if: steps.run.outputs.linkedin_reminders == 'true'
        run: rm -f content/linkedin-reminders.json

      - name: Summary
        if: always()
        run: |
          echo "## Scheduled publish run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Any published: \`${{ steps.run.outputs.any_published }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Slugs: \`${{ steps.run.outputs.slugs }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- LinkedIn reminders: \`${{ steps.run.outputs.linkedin_reminders }}\`" >> $GITHUB_STEP_SUMMARY
